{% extends "base.html" %}

{% block page_title %}Bill History{% endblock %}

{% block content %}
<div class="card">
    <div class="flex-between">
        <div class="form-group" style="width: 300px; margin-bottom: 0;">
            <input type="text" id="search-input" class="form-control" placeholder="Search by Bill No, Name, Phone..." onkeyup="searchBills()">
        </div>
        <button class="btn btn-primary" onclick="loadBills()"><i class="fas fa-sync"></i> Refresh</button>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Bill Number</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Total Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="bills-table-body">
                <!-- Data will be loaded here via JS -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        loadBills();
    });

    function loadBills(searchQuery = '') {
        fetch('/api/bills?search=' + encodeURIComponent(searchQuery))
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('bills-table-body');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No bills found</td></tr>';
                return;
            }
            
            data.forEach(bill => {
                let row = `<tr>
                    <td>${bill.created_at}</td>
                    <td><strong>${bill.bill_number}</strong></td>
                    <td>${bill.name}</td>
                    <td>${bill.phone}</td>
                    <td>₹${bill.total_amount.toFixed(2)}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="showInvoiceModal(${bill.id})" style="padding: 5px 10px; font-size: 12px; margin-right: 5px;"><i class="fas fa-eye"></i> View & Print</button>
                        <a href="#" onclick="event.preventDefault(); downloadPdf(${bill.id})" class="btn btn-primary" style="padding: 5px 10px; font-size: 12px;"><i class="fas fa-file-pdf"></i> Download PDF</a>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });
        })
        .catch(err => console.error("Failed to load bills:", err));
    }

    let searchTimeout;
    function searchBills() {
        clearTimeout(searchTimeout);
        let query = document.getElementById('search-input').value;
        searchTimeout = setTimeout(() => {
            loadBills(query);
        }, 500); // 500ms debounce
    }
</script>
{% endblock %}
